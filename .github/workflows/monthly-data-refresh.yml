name: Monthly Data Refresh

on:
  schedule:
    - cron: "0 2 5 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh recent source data
        run: npm run data:refresh

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Commit refreshed data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Refresh recent official dashboard data"
          file_pattern: "src/data/tfpDashboard.ts"
